server {
    port 8080
    host 127.0.0.1
    root www

    location / {
        allow_methods GET
        autoindex on
    }

    location /put_test/ {
        allow_methods PUT
        upload_store www/uploads
    }

    location /post_body {
        allow_methods POST
        client_max_body_size 100
    }

    location .bla {
        allow_methods POST GET
        cgi_pass cgi_tester
    }

    location /directory {
        allow_methods GET POST
        root YoupiBanane
        index youpi.bad_extension
    }
}