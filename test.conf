server {
    port 8080
    host 127.0.0.1
    server_name webserv

    root www

    client_max_body_size 1000000000

    location / {
        allow_methods GET
        index index.html
    }

    location .bla {
        allow_methods POST
        cgi_pass ./cgi_tester
    }

    location /post_body {
        allow_methods POST
        client_max_body_size 100
    }

    location /directory {
        allow_methods GET POST
        root YoupiBanane
        index youpi.bad_extension
    }

    location /put_test/ {
        allow_methods PUT
        upload_path ./
    }
}
