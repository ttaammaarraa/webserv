# Full Configuration for Evaluation
server {
    port 8080
    host 127.0.0.1
    server_name webserv
    root www

    error_pages 403 /errors/403.html
    error_pages 404 /errors/404.html
    error_pages 500 /errors/500.html

    location / {
        allow_methods GET
        index index.html
    }

    # Autoindex
    location /images {
        autoindex on
    }

    # CGI ( cgi_tester)
    location .bla {
        allow_methods POST
        cgi_pass ./cgi_tester
    }

    #    CGI (PHP)
    location .php {
        allow_methods GET POST
        cgi_pass /usr/bin/php-cgi
    }

    #   Body
    location /post_body {
        allow_methods POST
        client_max_body_size 100
    }

    #    Directory  (YoupiBanane)
    location /directory {
        allow_methods GET POST
        root YoupiBanane
        index youpi.bad_extension
    }

    #    (Upload)
    location /put_test/ {
        allow_methods POST
        upload_path ./uploads/
    }
}
