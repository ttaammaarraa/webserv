server {
    port 8082
    host 127.0.0.1
    server_name upload.local;
    error_pages 404 ./errors/404.html
    error_pages 500 ./errors/500.html
    root ./www
    client_max_body_size 20000000

    location /cgi-bin {
        root ./www
        allow_methods GET POST
        upload_path ./uploads/
        cgi_pass /usr/bin/python3
    }
}
