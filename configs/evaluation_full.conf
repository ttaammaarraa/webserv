server {
    port 8092
    host 127.0.0.1
    server_name full.local;
    error_pages 404 ./errors/404.html
    error_pages 500 ./errors/500.html
    error_pages 403 ./errors/403.html
    error_pages 400 ./errors/400.html
    error_pages 405 ./errors/405.html
    error_pages 413 ./errors/413.html
    root ./www
    client_max_body_size 5000000

    location / {
        allow_methods GET POST
        index index.html
        autoindex off
    }

    location /folder/ {
        allow_methods GET
        autoindex on
    }

    location /cgi-bin {
        root ./www
        allow_methods GET POST
        cgi_pass /usr/bin/python3
        upload_path ./uploads/
    }

    location /uploads {
        allow_methods GET
    }
}
