server {
    port 8091
    host 127.0.0.1
    server_name post.local;
    error_pages 404 ./errors/404.html
    root ./www
    client_max_body_size 2000000

    location / {
        allow_methods GET POST
        index index.html
    }

    # POST target: static page allowed only for POST in this config
    location /post.html {
        allow_methods POST
    }

    location /cgi-bin {
        root ./www
        allow_methods POST
        cgi_pass /usr/bin/python3
        upload_path ./uploads/
    }
}
